<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ФАКЕЛ-12</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #050a05;
  --bg-panel: #0a120a;
  --bg-input: #0d160d;
  --border: #1a3a1a;
  --border-glow: #00ff4133;
  --text-main: #c8e6c9;
  --text-dim: #4a6a4a;
  --text-system: #607d60;
  --green-bright: #00ff41;
  --green-mid: #00cc33;
  --amber: #ffa000;
  --red: #ff1744;
  --gold: #daa520;
  --hostile-red: #ff0033;
}

html, body {
  height: 100%;
  background: #000;
  font-family: 'Share Tech Mono', monospace;
  color: var(--text-main);
  overflow: hidden;
}

/* Container — phone-width centered */
.device {
  width: 100%;
  max-width: 460px;
  height: 100vh;
  margin: 0 auto;
  background: var(--bg-deep);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* === NOISE OVERLAY === */
.noise-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size: 256px;
  animation: noiseShift 0.5s steps(5) infinite;
}

@keyframes noiseShift {
  0% { transform: translate(0,0); }
  25% { transform: translate(-5px, 3px); }
  50% { transform: translate(3px, -2px); }
  75% { transform: translate(-3px, -5px); }
  100% { transform: translate(5px, 2px); }
}

/* === SCAN LINES === */
.scanlines {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 99;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  opacity: 0.3;
}

/* === VIGNETTE === */
.vignette {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 98;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
}

/* === GLITCH OVERLAY (triggered by JS) === */
.glitch-bar {
  position: fixed;
  left: 0; right: 0;
  height: 3px;
  background: var(--green-bright);
  opacity: 0;
  pointer-events: none;
  z-index: 101;
  mix-blend-mode: screen;
}

/* === STATUS BAR === */
.status-bar {
  padding: 8px 12px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green-bright);
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 4px var(--green-bright);
}

.status-dot.warning { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
.status-dot.danger { background: var(--red); box-shadow: 0 0 4px var(--red); animation: pulseFast 0.5s ease-in-out infinite; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes pulseFast { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

.status-value { color: var(--green-bright); }
.status-value.warning { color: var(--amber); }
.status-value.danger { color: var(--red); }

/* === TEAM PANEL === */
.team-panel {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 6px 8px;
  background: var(--bg-deep);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.team-member {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 2px;
  font-size: 11px;
  transition: all 0.5s;
}

.team-member.dead {
  opacity: 0.35;
  border-color: #1a1a1a;
}

.team-member.dead .member-name {
  text-decoration: line-through;
  color: #555;
}

.member-color {
  width: 3px;
  height: 24px;
  border-radius: 1px;
  flex-shrink: 0;
}

.member-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  min-width: 90px;
}

.member-ecg {
  flex: 1;
  height: 24px;
  position: relative;
  overflow: hidden;
}

.member-ecg canvas {
  width: 100%;
  height: 100%;
}

.member-status {
  font-size: 9px;
  letter-spacing: 1px;
  padding: 2px 5px;
  border-radius: 2px;
  background: rgba(0,255,65,0.1);
  color: var(--green-bright);
  white-space: nowrap;
}

.member-status.dead {
  background: rgba(255,23,68,0.15);
  color: #aa3333;
}

/* === MESSAGE LOG === */
.message-log {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
}

.message-log::-webkit-scrollbar { width: 3px; }
.message-log::-webkit-scrollbar-track { background: var(--bg-deep); }
.message-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg {
  padding: 6px 10px;
  border-left: 2px solid var(--border);
  font-size: 13px;
  line-height: 1.5;
  animation: msgAppear 0.3s ease-out;
}

@keyframes msgAppear {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg .timestamp {
  color: var(--text-dim);
  font-size: 10px;
  margin-right: 6px;
}

.msg .sender {
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 1px;
  margin-right: 4px;
}

.msg.system {
  border-left-color: var(--text-system);
  color: var(--text-system);
  font-style: italic;
  font-size: 11px;
}

.msg.hostile {
  border-left-color: var(--hostile-red);
  color: var(--hostile-red);
  animation: msgAppear 0.3s ease-out, glitchText 0.15s steps(2) 3;
  text-shadow: 2px 0 #ff0000, -2px 0 #0000ff;
}

@keyframes glitchText {
  0% { transform: translateX(0); }
  50% { transform: translateX(-3px) skewX(-2deg); }
  100% { transform: translateX(2px) skewX(1deg); }
}

.msg.radmila {
  border-left-color: var(--gold);
  border-left-width: 3px;
}

.msg.radmila .sender { color: var(--gold); }
.msg.radmila .text { color: #e8d5a0; }

.msg.center {
  border-left-color: #ffffff44;
}
.msg.center .sender { color: #aaa; }

.msg .text { display: inline; }

/* === CHANNEL INDICATOR === */
.channel-line {
  height: 2px;
  background: var(--bg-panel);
  position: relative;
  flex-shrink: 0;
  overflow: hidden;
}

.channel-dot {
  position: absolute;
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green-bright), transparent);
  animation: channelSweep 3s linear infinite;
}

@keyframes channelSweep {
  0% { left: -40px; }
  100% { left: 100%; }
}

/* === INPUT AREA === */
.input-area {
  padding: 8px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}

.text-input-row {
  display: flex;
  gap: 6px;
}

.text-input {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--green-bright);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  transition: border-color 0.3s;
}

.text-input:focus {
  border-color: var(--green-bright);
  box-shadow: 0 0 8px rgba(0,255,65,0.15);
}

.text-input::placeholder {
  color: var(--text-dim);
}

.send-btn {
  background: var(--bg-input);
  border: 1px solid var(--green-bright);
  color: var(--green-bright);
  padding: 8px 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}

.send-btn:hover {
  background: rgba(0,255,65,0.1);
  box-shadow: 0 0 10px rgba(0,255,65,0.2);
}

/* === ACTION BUTTONS === */
.action-buttons {
  display: flex;
  gap: 6px;
}

.action-btn {
  flex: 1;
  padding: 10px 8px;
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--bg-input);
  color: var(--text-main);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  text-transform: uppercase;
}

.action-btn:hover {
  border-color: var(--green-bright);
  color: var(--green-bright);
  background: rgba(0,255,65,0.05);
  box-shadow: 0 0 12px rgba(0,255,65,0.15);
}

.action-btn.emergency {
  border-color: var(--red);
  color: var(--red);
}

.action-btn.emergency:hover {
  background: rgba(255,23,68,0.1);
  box-shadow: 0 0 12px rgba(255,23,68,0.2);
}

/* === PREDICTIVE SUGGESTIONS === */
.suggestions {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  padding-bottom: 2px;
}

.suggestions::-webkit-scrollbar { height: 2px; }
.suggestions::-webkit-scrollbar-thumb { background: var(--border); }

.suggest-btn {
  white-space: nowrap;
  padding: 5px 10px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text-system);
  background: transparent;
  border: 1px solid #1a2a1a;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
}

.suggest-btn:hover {
  color: var(--green-bright);
  border-color: var(--green-mid);
}

/* === CONNECTION LOST OVERLAY === */
.connection-lost {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #000;
  z-index: 90;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 16px;
}

.connection-lost.active { display: flex; }

.connection-lost h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  color: var(--amber);
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  animation: pulse 1.5s ease-in-out infinite;
}

.connection-lost .spinner {
  width: 30px;
  height: 30px;
  border: 2px solid var(--border);
  border-top-color: var(--green-bright);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* === TYPEWRITER CURSOR === */
.typing-cursor {
  display: inline-block;
  width: 7px;
  height: 14px;
  background: var(--green-bright);
  animation: blink 0.7s steps(1) infinite;
  vertical-align: middle;
  margin-left: 2px;
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="noise-overlay"></div>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="glitch-bar" id="glitchBar"></div>

<div class="device" id="device">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot" id="connDot"></div>
      <span>СОЕДИНЕНИЕ:</span>
      <span class="status-value" id="connStatus">СТАБИЛЕН</span>
    </div>
    <div class="status-item">
      <span>ЗАРЯД:</span>
      <span class="status-value" id="battery">85%</span>
    </div>
    <div class="status-item">
      <span>ИСКАЖЕНИЕ:</span>
      <span class="status-value" id="distortion">7%</span>
    </div>
  </div>

  <!-- TEAM PANEL -->
  <div class="team-panel" id="teamPanel">
    <div class="team-member dead" data-member="simonov">
      <div class="member-color" style="background:#4fc3f7"></div>
      <span class="member-name">СИМОНОВ</span>
      <div class="member-ecg"><canvas id="ecg-simonov"></canvas></div>
      <span class="member-status dead">ПОТЕРЯН</span>
    </div>
    <div class="team-member dead" data-member="starkov">
      <div class="member-color" style="background:#ce93d8"></div>
      <span class="member-name">СТАРКОВ</span>
      <div class="member-ecg"><canvas id="ecg-starkov"></canvas></div>
      <span class="member-status dead">ПОТЕРЯН</span>
    </div>
    <div class="team-member dead" data-member="zvyagintsev">
      <div class="member-color" style="background:#ffb74d"></div>
      <span class="member-name">ЗВЯГИНЦЕВ</span>
      <div class="member-ecg"><canvas id="ecg-zvyagintsev"></canvas></div>
      <span class="member-status dead">ПОТЕРЯН</span>
    </div>
    <div class="team-member" data-member="gromov">
      <div class="member-color" style="background:#81c784"></div>
      <span class="member-name">ГРОМОВ</span>
      <div class="member-ecg"><canvas id="ecg-gromov"></canvas></div>
      <span class="member-status">АКТИВЕН</span>
    </div>
  </div>

  <!-- MESSAGE LOG -->
  <div class="message-log" id="messageLog">
  </div>

  <!-- CHANNEL INDICATOR -->
  <div class="channel-line">
    <div class="channel-dot"></div>
  </div>

  <!-- INPUT AREA -->
  <div class="input-area">
    <div class="suggestions" id="suggestions">
      <button class="suggest-btn" onclick="sendSuggestion(this)">Доложите обстановку</button>
      <button class="suggest-btn" onclick="sendSuggestion(this)">Что вы видите?</button>
      <button class="suggest-btn" onclick="sendSuggestion(this)">Держитесь!</button>
      <button class="suggest-btn" onclick="sendSuggestion(this)">Отступайте!</button>
    </div>
    <div class="text-input-row">
      <input type="text" class="text-input" id="textInput" placeholder="> Введите сообщение..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="send-btn" onclick="sendMessage()">▶</button>
    </div>
    <div class="action-buttons" id="actionButtons">
      <button class="action-btn" onclick="chooseAction('left')" id="btnLeft">ПРИНЯТЬ КОМАНДОВАНИЕ</button>
      <button class="action-btn" onclick="chooseAction('right')" id="btnRight">ПОСЛАТЬ ПОДКРЕПЛЕНИЕ</button>
      <button class="action-btn emergency" onclick="chooseAction('special')" id="btnSpecial">ЭКСТРЕННО</button>
    </div>
  </div>

</div>

<!-- CONNECTION LOST OVERLAY -->
<div class="connection-lost" id="connLost">
  <div class="spinner"></div>
  <h2>Восстановление квантового тоннеля<br>Ожидайте...</h2>
</div>

<script>
// ==================== ECG RENDERING ====================
const ecgCanvases = {};
const ecgData = {};
const memberStates = {
  simonov: 'dead',
  starkov: 'dead',
  zvyagintsev: 'dead',
  gromov: 'alive'
};

function initECG() {
  ['simonov','starkov','zvyagintsev','gromov'].forEach(name => {
    const canvas = document.getElementById('ecg-' + name);
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ecgCanvases[name] = canvas.getContext('2d');
    ecgData[name] = { offset: 0, points: [] };
    
    // Pre-fill with flat line
    for (let i = 0; i < canvas.width; i++) {
      ecgData[name].points.push(0);
    }
  });
}

function generateECGPoint(name) {
  if (memberStates[name] === 'dead') return 0;
  
  const d = ecgData[name];
  d.offset++;
  const cycle = d.offset % 80;
  
  if (cycle === 20) return 0.6;
  if (cycle === 22) return -0.3;
  if (cycle === 24) return 1.0;
  if (cycle === 26) return -0.8;
  if (cycle === 28) return 0.2;
  if (cycle === 30) return 0;
  
  return (Math.random() - 0.5) * 0.05;
}

function drawECG() {
  Object.keys(ecgCanvases).forEach(name => {
    const ctx = ecgCanvases[name];
    const canvas = ctx.canvas;
    const w = canvas.width;
    const h = canvas.height;
    const mid = h / 2;
    
    // Add new point
    ecgData[name].points.push(generateECGPoint(name));
    if (ecgData[name].points.length > w) ecgData[name].points.shift();
    
    ctx.clearRect(0, 0, w, h);
    
    const color = memberStates[name] === 'dead' ? '#333333' : '#00ff41';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.shadowColor = color;
    ctx.shadowBlur = memberStates[name] === 'dead' ? 0 : 4;
    
    ctx.beginPath();
    const pts = ecgData[name].points;
    for (let i = 0; i < pts.length; i++) {
      const x = i;
      const y = mid - pts[i] * mid * 0.8;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  });
  
  requestAnimationFrame(drawECG);
}

// ==================== MESSAGES ====================
const colors = {
  'ГРОМОВ': '#81c784',
  'СИМОНОВ': '#4fc3f7',
  'СТАРКОВ': '#ce93d8',
  'ЗВЯГИНЦЕВ': '#ffb74d',
  'ЦЕНТР': '#aaaaaa',
  'РАДМИЛА': '#daa520'
};

let messageQueue = [];
let isTyping = false;
let currentTime = { h: 9, m: 34 };

function getTime() {
  return `${String(currentTime.h).padStart(2,'0')}:${String(currentTime.m).padStart(2,'0')}`;
}

function advanceTime(mins) {
  currentTime.m += mins;
  while (currentTime.m >= 60) { currentTime.m -= 60; currentTime.h++; }
}

function addMessage(sender, text, type = 'normal') {
  messageQueue.push({ sender, text, type });
  if (!isTyping) processQueue();
}

function processQueue() {
  if (messageQueue.length === 0) { isTyping = false; return; }
  isTyping = true;
  
  const msg = messageQueue.shift();
  const log = document.getElementById('messageLog');
  const div = document.createElement('div');
  
  let cls = 'msg';
  if (msg.type === 'system') cls += ' system';
  else if (msg.type === 'hostile') cls += ' hostile';
  else if (msg.type === 'radmila') cls += ' radmila';
  else if (msg.sender === 'ЦЕНТР') cls += ' center';
  div.className = cls;
  
  if (msg.type === 'system') {
    div.innerHTML = `<span class="text">--- ${msg.text} ---</span>`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    advanceTime(1);
    setTimeout(processQueue, 600);
    return;
  }
  
  const ts = getTime();
  const senderColor = colors[msg.sender] || var('--text-main');
  
  div.innerHTML = `<span class="timestamp">[${ts}]</span> <span class="sender" style="color:${senderColor}">${msg.sender}:</span> <span class="text"></span>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  
  // Typewriter for protagonist messages
  if (msg.sender !== 'ЦЕНТР' && msg.type !== 'hostile') {
    const textEl = div.querySelector('.text');
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'typing-cursor';
    textEl.after(cursor);
    
    const typeInterval = setInterval(() => {
      if (i < msg.text.length) {
        textEl.textContent += msg.text[i];
        i++;
        log.scrollTop = log.scrollHeight;
      } else {
        clearInterval(typeInterval);
        cursor.remove();
        advanceTime(1);
        setTimeout(processQueue, 400);
      }
    }, 30 + Math.random() * 40);
  } else {
    div.querySelector('.text').textContent = msg.text;
    advanceTime(1);
    setTimeout(processQueue, 300);
  }
}

// ==================== GLITCH EFFECTS ====================
let distortionLevel = 7;

function triggerGlitch() {
  const bar = document.getElementById('glitchBar');
  bar.style.top = Math.random() * 100 + '%';
  bar.style.opacity = '0.8';
  bar.style.height = (2 + Math.random() * 6) + 'px';
  
  setTimeout(() => {
    bar.style.opacity = '0';
  }, 50 + Math.random() * 100);
}

function updateDistortion(level) {
  distortionLevel = level;
  document.getElementById('distortion').textContent = level + '%';
  
  const noise = document.querySelector('.noise-overlay');
  noise.style.opacity = 0.04 + (level / 100) * 0.18;
  
  if (level > 20) {
    document.getElementById('distortion').className = 'status-value warning';
  }
  if (level > 50) {
    document.getElementById('distortion').className = 'status-value danger';
  }
}

function glitchLoop() {
  const interval = Math.max(500, 8000 - distortionLevel * 70);
  
  if (Math.random() < distortionLevel / 100) {
    triggerGlitch();
  }
  
  setTimeout(glitchLoop, interval);
}

// ==================== USER ACTIONS ====================
function sendMessage() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  
  addMessage('ЦЕНТР', text);
  input.value = '';
  
  // Demo: auto-response
  setTimeout(() => {
    addMessage('ГРОМОВ', 'Принял, командир. Выполняю.', 'normal');
  }, 2000);
}

function sendSuggestion(btn) {
  const text = btn.textContent;
  addMessage('ЦЕНТР', text);
  
  setTimeout(() => {
    if (text.includes('обстановку')) {
      addMessage('ГРОМОВ', 'Нахожусь в квадрате 7-4. Вижу разрушенные строения. Движение впереди... Неопознанное.', 'normal');
    } else if (text.includes('видите')) {
      addMessage('ГРОМОВ', 'Улица. Фонари не горят. Что-то движется в переулке слева. Не уверен что это человек.', 'normal');
    } else if (text.includes('Держитесь')) {
      addMessage('ГРОМОВ', 'Стараюсь, командир. Патроны на исходе.', 'normal');
    } else {
      addMessage('ГРОМОВ', 'Отступать некуда. Позади... уже не наша реальность.', 'normal');
    }
  }, 1500);
}

function chooseAction(choice) {
  if (choice === 'left') {
    addMessage(null, 'Принятие командования подтверждено. Протокол "Гамма-0" активирован.', 'system');
  } else if (choice === 'right') {
    addMessage(null, 'Запрос на подкрепление отправлен. Время ожидания: неизвестно.', 'system');
  } else {
    addMessage(null, 'ЭКСТРЕННЫЙ ПРОТОКОЛ АКТИВИРОВАН', 'system');
    setTimeout(() => {
      triggerGlitch();
      triggerGlitch();
      updateDistortion(Math.min(100, distortionLevel + 15));
    }, 500);
  }
}

// ==================== CONNECTION LOST ====================
function showConnectionLost() {
  document.getElementById('connLost').classList.add('active');
}

function hideConnectionLost() {
  document.getElementById('connLost').classList.remove('active');
}
