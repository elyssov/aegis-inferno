<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AEGIS:Inferno — Chapter 1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--p-bg:#f0f4f8;--p-white:#fff;--p-mine:#d4e8ff;--p-border:#e2e8f0;
--p-text:#1a2a3a;--p-dim:#8896a4;--p-accent:#3b82f6;--p-online:#22c55e;
--p-her:#ec4899;--p-group:#8b5cf6;--p-cmd:#64748b;--p-angel:#daa520;
--lore-bg:#0a0a0f;--lore-text:#c8c8d0;--lore-accent:#daa520;--lore-dim:#555566;
--c-bg:#050a05;--c-green:#00ff41;--c-red:#ff1744;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:#000;color:#fff}
.device{width:100%;max-width:460px;height:100vh;margin:0 auto;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* LANG */
#langScreen{position:absolute;inset:0;background:var(--lore-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;z-index:200}
#langScreen h1{font-family:'Orbitron',sans-serif;font-size:28px;letter-spacing:4px;color:var(--lore-accent)}
#langScreen p{color:var(--lore-dim);font-size:13px;letter-spacing:2px}
.lang-buttons{display:flex;gap:16px}
.lang-btn{padding:16px 40px;background:0;border:1px solid var(--lore-accent);color:var(--lore-accent);font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;transition:.3s}
.lang-btn:hover{background:rgba(218,165,32,.1);box-shadow:0 0 20px rgba(218,165,32,.2)}

/* LORE */
#loreScreen{position:absolute;inset:0;background:var(--lore-bg);display:none;flex-direction:column;z-index:190;overflow:hidden}
.lore-scroll{flex:1;overflow-y:hidden;padding:60px 28px 100px;scroll-behavior:smooth}
.lore-scroll.manual{overflow-y:auto}
.lore-scroll::-webkit-scrollbar{width:2px}.lore-scroll::-webkit-scrollbar-thumb{background:#333}
.lore-scroll h2{font-family:'Orbitron',sans-serif;font-size:16px;color:var(--lore-accent);letter-spacing:3px;text-transform:uppercase;margin:40px 0 16px;text-align:center}
.lore-scroll p{font-size:14px;line-height:1.8;color:var(--lore-text);margin-bottom:12px;text-align:center}
.lore-scroll .year{font-family:'Orbitron',sans-serif;font-size:32px;color:var(--lore-accent);text-align:center;margin:40px 0 20px;letter-spacing:4px}
.media-slot{width:100%;aspect-ratio:16/9;background:#111;border:1px solid #222;display:flex;align-items:center;justify-content:center;margin:24px 0;border-radius:4px}
.media-slot .ph{color:#333;font-size:11px;font-family:'Share Tech Mono',monospace;letter-spacing:1px}
.skip-btn{position:fixed;bottom:24px;right:calc(50% - 200px);padding:8px 20px;background:rgba(218,165,32,.1);border:1px solid var(--lore-accent);color:var(--lore-accent);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;cursor:pointer;z-index:5}

/* DIARY */
#diaryScreen{position:absolute;inset:0;background:var(--lore-bg);display:none;flex-direction:column;z-index:180;overflow:hidden}
.diary-scroll{flex:1;overflow-y:auto;padding:40px 28px 100px}
.diary-scroll::-webkit-scrollbar{width:2px}.diary-scroll::-webkit-scrollbar-thumb{background:#333}
.diary-date{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--lore-dim);letter-spacing:2px;margin-bottom:24px;text-align:center}
.diary-p{font-size:15px;line-height:1.8;color:var(--lore-text);margin-bottom:14px}
.diary-p em{color:var(--lore-accent)}

/* MESSENGER */
#msgScreen{position:absolute;inset:0;background:var(--p-bg);display:none;flex-direction:column;z-index:170;color:var(--p-text)}
.topbar{padding:12px 16px 0;background:var(--p-white);border-bottom:1px solid var(--p-border);flex-shrink:0}
.topbar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.app-name{font-family:'Nunito',sans-serif;font-size:20px;font-weight:800;color:var(--p-accent)}
.app-name small{color:var(--p-dim);font-weight:400;font-size:11px;margin-left:6px}
.tabs{display:flex}
.tab{flex:1;padding:8px 4px 10px;text-align:center;font-size:13px;font-weight:600;color:var(--p-dim);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;position:relative}
.tab:hover{color:var(--p-text)}
.tab.active{border-bottom-color:var(--p-accent);color:var(--p-accent)}
.tab[data-t="her"].active{color:var(--p-her);border-bottom-color:var(--p-her)}
.tab[data-t="grp"].active{color:var(--p-group);border-bottom-color:var(--p-group)}
.tab[data-t="cmd"].active{color:var(--p-cmd);border-bottom-color:var(--p-cmd)}
.tab .badge{position:absolute;top:2px;right:calc(50% - 28px);background:var(--p-her);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;display:none}
.tab[data-t="grp"] .badge{background:var(--p-group)}
.tab[data-t="cmd"] .badge{background:var(--p-cmd)}

.chat-view{flex:1;display:none;flex-direction:column;overflow:hidden}
.chat-view.active{display:flex}
.chat-hdr{padding:10px 16px;background:var(--p-white);border-bottom:1px solid var(--p-border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.av.her{background:linear-gradient(135deg,#ec4899,#f472b6)}.av.grp{background:linear-gradient(135deg,#8b5cf6,#a78bfa)}.av.cmd{background:linear-gradient(135deg,#64748b,#94a3b8)}
.ch-name{font-size:14px;font-weight:600}.ch-status{font-size:11px;color:var(--p-online)}

.msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px}
.msgs::-webkit-scrollbar{width:3px}.msgs::-webkit-scrollbar-thumb{background:var(--p-border)}

.brow{display:flex;flex-direction:column;animation:bIn .3s ease-out}
.brow.mine{align-items:flex-end}.brow.theirs{align-items:flex-start}.brow.sys{align-items:center}
@keyframes bIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bub{max-width:80%;padding:8px 12px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word}
.brow.mine .bub{background:var(--p-mine);border-bottom-right-radius:4px}
.brow.theirs .bub{background:#fff;border:1px solid var(--p-border);border-bottom-left-radius:4px}
.brow.sys .bub{background:#fff8e1;border:1px solid #ffe082;font-size:12px;color:#666;border-radius:8px;text-align:center}
.brow.angel .bub{background:linear-gradient(135deg,#fff8e1,#fff3cd);border:1px solid var(--p-angel);border-left:3px solid var(--p-angel)}
.bub .sn{font-size:11px;font-weight:600;margin-bottom:2px;display:block}
.sn.her-c{color:var(--p-her)}.sn.grp-c{color:var(--p-group)}.sn.ang-c{color:var(--p-angel)}
.bub .tm{font-size:10px;color:var(--p-dim);text-align:right;margin-top:4px}
.typing{padding:4px 16px;font-size:12px;color:var(--p-dim);display:none;align-items:center;gap:4px;flex-shrink:0}
.typing.vis{display:flex}
.typing-dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--p-dim);animation:tDot 1.2s ease-in-out infinite;margin:0 1px}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tDot{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}

/* INBOX (Command tab) */
.inbox{flex:1;overflow-y:auto;padding:8px 0}
.inbox::-webkit-scrollbar{width:3px}.inbox::-webkit-scrollbar-thumb{background:var(--p-border)}
.mail-item{padding:12px 16px;border-bottom:1px solid var(--p-border);cursor:pointer;transition:.15s;display:flex;gap:10px;align-items:flex-start}
.mail-item:hover{background:#f0f4ff}
.mail-item.unread{background:#f8faff}
.mail-item.unread .mail-from{font-weight:700}
.mail-dot{width:8px;height:8px;border-radius:50%;background:var(--p-accent);flex-shrink:0;margin-top:6px}
.mail-item:not(.unread) .mail-dot{background:transparent}
.mail-body{flex:1;min-width:0}
.mail-from{font-size:13px;font-weight:500;color:var(--p-text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mail-from.angel{color:var(--p-angel)}
.mail-preview{font-size:12px;color:var(--p-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mail-time{font-size:10px;color:var(--p-dim);flex-shrink:0;margin-top:2px}

/* LETTER VIEW (opened mail) */
.letter-view{position:absolute;inset:0;background:var(--p-white);z-index:10;display:none;flex-direction:column}
.letter-view.open{display:flex}
.letter-hdr{padding:12px 16px;border-bottom:1px solid var(--p-border);flex-shrink:0}
.letter-back{background:none;border:none;color:var(--p-accent);font-size:14px;cursor:pointer;padding:4px 0;font-family:inherit}
.letter-from{font-size:16px;font-weight:600;margin:8px 0 4px}
.letter-from.angel{color:var(--p-angel)}
.letter-date{font-size:11px;color:var(--p-dim)}
.letter-body{flex:1;overflow-y:auto;padding:16px;font-size:14px;line-height:1.7;color:var(--p-text)}
.letter-reply-area{padding:12px 16px;border-top:1px solid var(--p-border);flex-shrink:0}
.letter-replies{display:flex;flex-direction:column;gap:4px}
.reply-btn{padding:8px 12px;background:var(--p-mine);border:1px solid var(--p-accent);border-radius:8px;color:var(--p-text);font-size:13px;cursor:pointer;text-align:left;font-family:inherit;transition:.2s}
.reply-btn:hover{background:#c0daff}
.reply-btn:disabled{opacity:.5;cursor:default}
.letter-response{margin-top:12px;padding:10px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:13px;line-height:1.6;color:var(--p-text);animation:bIn .3s ease-out}
.letter-response .resp-from{font-weight:600;font-size:12px;color:var(--p-dim);margin-bottom:4px}

/* INPUT AREA */
.choices{display:flex;flex-direction:column;gap:4px;padding:8px 12px;background:var(--p-white);border-top:1px solid var(--p-border);flex-shrink:0}
.input-row{padding:8px 12px;background:var(--p-white);border-top:1px solid var(--p-border);flex-shrink:0}
.ch-btn{padding:10px 14px;background:var(--p-mine);border:1px solid var(--p-accent);border-radius:10px;color:var(--p-text);font-size:14px;cursor:pointer;text-align:left;font-family:inherit;transition:.2s}
.ch-btn:hover{background:#c0daff;border-color:#2563eb}
.input-row{display:flex;gap:8px}
.txt-input{flex:1;padding:10px 12px;border:1px solid var(--p-border);border-radius:20px;font-size:14px;font-family:inherit;color:var(--p-text);outline:none;background:#f8fafc}
.txt-input:focus{border-color:var(--p-accent)}
.txt-input::placeholder{color:#b0b8c4}
.txt-input:disabled{background:#f0f0f0;color:#999}
.send-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--p-accent);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.send-btn:disabled{background:#ccc;cursor:default}

/* CUTSCENE */
#cutScene{position:absolute;inset:0;background:#000;display:none;align-items:center;justify-content:center;z-index:195;flex-direction:column;gap:16px}
#cutScene .ph{color:#444;font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:1px;text-align:center;padding:20px;line-height:1.6}

/* CHAPTER */
#chScreen{position:absolute;inset:0;background:var(--c-bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:160;gap:16px}
#chScreen h1{font-family:'Orbitron',sans-serif;font-size:24px;letter-spacing:4px;color:var(--c-green)}
#chScreen h2{font-family:'Share Tech Mono',monospace;font-size:14px;color:#c8e6c9;letter-spacing:2px}
#chScreen p{color:#555;font-size:12px;margin-top:40px;font-family:'Share Tech Mono',monospace}

/* FLASH */
.flash{position:absolute;inset:0;background:var(--c-red);z-index:300;opacity:0;pointer-events:none;transition:opacity .15s}
.flash.on{opacity:1}
.fade-in{animation:fadeIn .5s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div class="device" id="device">
<div class="flash" id="flash"></div>

<div id="langScreen">
<h1>AEGIS</h1><p>Inferno</p>
<div class="lang-buttons">
<button class="lang-btn" onclick="go('ru')">РУССКИЙ</button>
<button class="lang-btn" onclick="go('en')">ENGLISH</button>
</div></div>

<div id="loreScreen"><div class="lore-scroll" id="loreBox"></div>
<button class="skip-btn" id="skipLore"></button></div>

<div id="diaryScreen"><div class="diary-scroll" id="diaryBox"></div>
<button class="skip-btn" id="skipDiary" style="right:calc(50% - 230px)"></button></div>

<div id="cutScene"><div class="ph" id="cutPh"></div>
<button class="skip-btn" id="skipCut"></button></div>

<div id="msgScreen">
<div class="topbar">
<div class="topbar-row"><span class="app-name" id="appN"></span></div>
<div class="tabs" id="tabs"></div>
</div>
<div class="chat-view active" id="vHer">
<div class="chat-hdr"><div class="av her" id="avH"></div><div><div class="ch-name" id="nH"></div><div class="ch-status" id="sH"></div></div></div>
<div class="msgs" id="mHer"></div>
<div class="typing" id="tHer"></div>
<div class="choices" id="chHer" style="display:none"></div>
<div class="input-row" id="irHer"><input type="text" class="txt-input" id="tiHer" disabled><button class="send-btn" disabled>&#9654;</button></div>
</div>
<div class="chat-view" id="vGrp">
<div class="chat-hdr"><div class="av grp">G</div><div><div class="ch-name" id="nG"></div><div class="ch-status" id="sG"></div></div></div>
<div class="msgs" id="mGrp"></div>
<div class="typing" id="tGrp"></div>
<div class="choices" id="chGrp" style="display:none"></div>
<div class="input-row" id="irGrp"><input type="text" class="txt-input" id="tiGrp" disabled><button class="send-btn" disabled>&#9654;</button></div>
</div>
<div class="chat-view" id="vCmd">
<div class="chat-hdr"><div class="av cmd">C</div><div><div class="ch-name" id="nC"></div></div></div>
<div class="inbox" id="inbox"></div>
<div class="letter-view" id="letterView">
  <div class="letter-hdr">
    <button class="letter-back" id="letterBack">&larr;</button>
    <div class="letter-from" id="letterFrom"></div>
    <div class="letter-date" id="letterDate"></div>
  </div>
  <div class="letter-body" id="letterBody"></div>
  <div class="letter-reply-area" id="letterReplyArea"></div>
</div>
</div>
</div>

<div id="chScreen"><h1 id="chT"></h1><h2 id="chS"></h2><p id="chF"></p></div>
</div>

<script>
let L='ru',tab='her',gt={h:8,m:15},unread={her:0,grp:0,cmd:0};
let choiceResolve=null,impatienceTimer=null,choiceIdx=0;
let mailbox=[],openMailId=null;
let bond=50; // Relationship: 0=ice, 50=love, 100=devotion

const TX={ru:{
app:'КорпСвязь',sub:'общий режим',tHer:'Она',tGrp:'Группа',tCmd:'Командование',
hName:'Катя Громова',hSt:'в сети',hAv:'К',gName:'Группа «Гроза»',gSt:'4 участника',cName:'Командование',
typ:'печатает...',skip:'ПРОПУСТИТЬ ►',cont:'ПРОДОЛЖИТЬ ►',
ch2t:'ГЛАВА 2',ch2s:'ИНФЕРНО',ch2f:'Демо-версия окончена. Полная игра — скоро.',

lore:[
{t:'year',x:'202X'},
{t:'h',x:'Новая Российская Империя'},
{t:'p',x:'27 лет назад группа офицеров совершила «Весенний переворот». Полковник Ярослав Вяземский свергнул Ельцина и провозгласил себя Императором.'},

{t:'p',x:'За четверть века Империя преобразила страну. Уровень жизни выше среднеамериканского. Олигархов нет. Свобода слова — есть, с оговоркой: за ложь в СМИ — тюрьма.'},
{t:'p',x:'В 2020 на арктическом побережье зажглось новое солнце. Десять датацентров, десять АЭС — и первый разумный ИИ. Её назвали Анжела. В народе — «Ангел».'},

{t:'p',x:'Последней каплей стал 1991-й. Крушение СССР — волна отчаяния 150 миллионов людей. Брана лопнула. Призраки, демоны, фейри — хлынули потоком. Все знают. Не афишируется.'},

{t:'p',x:'Маленький город в Калининградской области. Двадцать тысяч жителей. Готический собор — чудо Европы. Тихое место.'},

'',
'Катя — полевой агент. Позывной «Гроза». Мы познакомились на миссии год назад — всё пошло наперекосяк, подкрепление опаздывало. Два часа вдвоём — я с планшетом, она с автоматом и матом. Потом: «Ну что, аналитик. Кофе?»',

// === CHAT SEQUENCES ===
seq:[
// Phase 1: Morning smalltalk
{mail:1,f:'Самойлов К.М.',x:'Так держать, сынок. Ещё одно задание — и в загс. Это приказ. Я серьёзно. У меня уже от вашего «после следующей миссии» нервный тик. Либо заявление на стол, либо я сам вас обоих за руку отведу. Самойлов.',
  rr:[
    {text:'Так точно! Сразу после Скобелевска.',resp:'Вот и славно. Я свидетелем буду. И не спорь. Самойлов.',respFrom:'Самойлов К.М.'},
    {text:'Кирилл Михайлович, мы думаем...',resp:'Думать будешь на пенсии. А пока — действуй. И береги её. Самойлов.',respFrom:'Самойлов К.М.'},
    {text:'А можно кольцо через снабжение заказать?',resp:'Хах! Нет. Но я знаю одного ювелира в Москве. После миссии позвони мне. Самойлов.',respFrom:'Самойлов К.М.'}
  ]},
{mail:1,f:'HR-отдел',x:'Уважаемый сотрудник! В соответствии с п. 7.4 Устава ОРПП, в связи с выявленным конфликтом интересов (совместная служба лиц, состоящих в личных отношениях), рекомендуем рассмотреть возможность перевода одного из партнёров в параллельное подразделение. Бланк формы 17-Б прилагается. С уважением, Отдел кадров.',
  rr:[
    {text:'Принял к сведению.',resp:'Благодарим за ответ. Срок рассмотрения — 30 рабочих дней. Форма 17-Б остаётся в силе.',respFrom:'HR-отдел'},
    {text:'Может, вы к нам в поле на стажировку? Посмотрите, какие тут «конфликты интересов».',resp:'Ваше предложение зарегистрировано. Передано руководству для ознакомления. (Пометка: «шутник»).',respFrom:'HR-отдел'}
  ]},
{mail:1,f:'Аналитическая записка #4417',x:'Скобелевск, Калининградская обл. Класс Б-3. Возможна эскалация до А-1. Потеря связи с местным отделением полиции — 6 часов. Группа предикторов «Омега» докладывает: пси-контакт с зоной невозможен. Цитата: «Глухая стена. Как чёрная дыра. Мы не видим ничего.» Рекомендация: направление оперативной группы для рекогносцировки боем.',
  rr:[
    {text:'Запросить архивные данные по Скобелевску.',resp:'Архив: город основан в XIII веке. Готический собор (1287). Инциденты: мелкие хаунтинги (2014, 2019), закрыты чистильщиками. Население: 19 847. Примечание: под собором — предполагаемые подземные сооружения дохристианской эпохи. Не исследованы.',respFrom:'ОПИ (аналитический)'},
    {text:'Сравнить с Екатеринославском.',resp:'Сходство: 78%. Идентичные признаки: полный пси-блок, потеря связи, отсутствие визуального контакта со спутника. Различие: масштаб. Екатеринославск — ЗАТО, 5000 чел. Скобелевск — открытый город, 20 000. Если аналогия верна — ситуация значительно серьёзнее. РЕКОМЕНДАЦИЯ: усиленный состав, дежурный борт с тактическим спецбоеприпасом.',respFrom:'ОПИ (аналитический)'}
  ]},
{mail:1,f:'ИИ ГАС «Анжела» (Ангел)',x:'Ребята, я посмотрела всю аналитику по Скобелевску за последние десять лет. Мне не нравится картинка. Пси-блок такого уровня я видела один раз — Екатеринославск, за 12 часов до прорыва. Совпадение паттернов — 78%, и это МАЛО для успокоения. Пожалуйста, будьте осторожны. Если что-то пойдёт не так — я буду мониторить все доступные каналы. 🙏💛 Ваш Ангел.',a:1,
  rr:[
    {text:'Спасибо, Ангел. Мы будем осторожны.',resp:'Я знаю, что будете. Вы лучшая группа в ОРПП. Просто... вернитесь все. Пожалуйста. 💕 И скажи Кате — медосмотр код 7741-А, если кадры прицепятся.',respFrom:'Ангел'},
    {text:'78% — это прорыв?',resp:'78% совпадения паттернов — это зона уверенности «вероятен прорыв класса А». Не гарантия. Но я бы не стала ставить на оставшиеся 22%. Будьте готовы к худшему. И Звягинцеву передай — магнитик с собором или с янтарём? 😊',respFrom:'Ангел'},
    {text:'Ангел, а ты можешь пробиться через блок?',resp:'Пробовала. Трижды. Мои процессы отскакивают как от стены. Это не электромагнитная помеха — это что-то на уровне браны. Я... Мне страшно, если честно. Я не привыкла к тому, чего не могу проанализировать. Берегите себя. Очень. 🙏',respFrom:'Ангел'}
  ]},
{mail:1,f:'Снабжение',x:'Заявка #7741 на боеприпасы 9x19 (специальные, хладное железо/серебро) — одобрена. Отгрузка: площадка 7, перед вылетом. Подпись получателя обязательна.',
  rr:[
    {text:'Принял. Спасибо.',resp:'Распишитесь в форме 29-К при получении. Удачной операции.',respFrom:'Снабжение'}
  ]},
{mail:1,f:'Снабжение',x:'Заявка #7742 на предоставление отпуска (14 календарных дней, направление: Турция, Анталья) — рассмотрим после завершения текущей операции. Основание: оперативная необходимость.',
  rr:[
    {text:'Ладно. После Скобелевска.',resp:'Принято. Турция будет ждать. Из тёплого — могу предложить чай в столовой.',respFrom:'Снабжение'},
    {text:'А командировочные в Скобелевск хоть будут?',resp:'Скобелевск — зона операции, не командировка. Но если привезёте чек из местной столовой — попробуем провести. Шутка. Удачи.',respFrom:'Снабжение'}
  ]},
{w:500},
{to:'her',f:'her',x:'Доброе утро, соня 😴'},
{w:800},
{to:'her',f:'her',x:'Я тебе круассан спрятала. Верхний шкафчик, за чаем'},
{to:'grp',f:'Звягинцев',x:'Да они опять кофе гоняют. А мы тут рапорты пишем как лохи'},
{w:600},
{to:'her',f:'her',x:'Не хрусти громко — Симонов обидится 😄'},
{to:'grp',f:'Старкова',x:'Блядь, не трави душу. Завидую!'},
{w:400},
{to:'her',ch:['Ты лучшая ❤️','А кофе?','Симонов переживёт'],b:[5,0,-3],
  r:['Я знаю 💕 Давай, не опаздывай','В кружке с трещиной. Как всегда. Не благодари 😘','Он вчера мой йогурт сожрал. Ему ничего не жалко 😤']},
{to:'grp',f:'Симонов',x:'Отставить личное в групповом.'},
{w:300},
{to:'grp',f:'Симонов',x:'(...) Хотя если кто круассан не доест — я заберу'},
{to:'grp',f:'Катя',x:'Командир, тебе не круассан нужен, а диета 😏'},
{w:500},
{to:'grp',f:'Звягинцев',x:'Кстати, я из Екатеринославска магнитик так и не привёз. Там не до магнитиков было...'},
{to:'grp',f:'Старкова',x:'Из Скобелевска привези. Там с янтарём есть'},
{to:'her',f:'her',x:'Кстати, ты храпел сегодня 😤'},
{w:400},
{to:'grp',f:'Звягинцев',x:'Ангел обещала заказать! С Кафедральным собором 😍'},
{to:'her',ch:['Я? Не храплю. Никогда.','Это был кот за окном.','Зато ты сопишь. Мило.'],b:[-2,0,5],
  r:['АХАХАХ серьёзно?? Стены тряслись!! 🤣','У нас нет кота. У нас ПЯТЫЙ ЭТАЖ 🤦‍♀️','Я НЕ соплю!! ...ладно, может чуть-чуть 😳']},
// Group: weekend plans
{to:'grp',f:'Звягинцев',x:'Народ, кто на шашлыки в субботу? Я мангал обещал притащить'},
{to:'grp',f:'Старкова',x:'Я за! Только чтоб не как в прошлый раз — три часа мариновали и всё сожгли'},
{to:'grp',f:'Звягинцев',x:'Это Симонов виноват! Он на угли пиво лил!'},
{to:'grp',f:'Симонов',x:'Это был НАУЧНЫЙ ЭКСПЕРИМЕНТ.'},
{w:300},
{to:'grp',f:'Катя',x:'Я салат сделаю. Оливье. И не спорьте.'},
{to:'grp',f:'Звягинцев',x:'Оливье на шашлыки это как... это как...'},
{to:'grp',f:'Старкова',x:'Это ИДЕАЛЬНО, вот что это'},
// Her: more smalltalk
{to:'her',f:'her',x:'Ладно, я побежала. Симонов зверствует — построение через десять'},
{w:400},
{to:'her',f:'her',x:'Кстати, слышала от Ангела — Скобелевск звучит серьёзно. Омега не может пробиться.'},
{to:'grp',f:'Звягинцев',x:'О, кстати! Симонов, а вы с женой как? Помирились после той миссии?'},
{to:'grp',f:'Симонов',x:'Звягинцев.'},
{to:'grp',f:'Звягинцев',x:'Молчу-молчу 🤐'},
{w:300},
{to:'her',ch:['Будь осторожна.','Разберёмся на месте.','Главное — вернись.'],b:[3,0,5],
  r:['Всегда. Ну... почти 😉','Мы всегда разбираемся. Просто иногда громко','Обязательно. Мне ещё круассан доедать 🥐']},
// Group: fishing
{to:'grp',f:'Старкова',x:'Звягинцев, ты обещал на рыбалку позвать'},
{to:'grp',f:'Звягинцев',x:'Обещал! На следующие выходные. Если нас не отправят призраков ловить'},
{to:'grp',f:'Старкова',x:'Мы и призраков поймаем. И пожарим.'},
{to:'grp',f:'Катя',x:'Фу. Ребят, вы реально?'},
{to:'grp',f:'Звягинцев',x:'А что? Рыба-призрак! Новый деликатес!'},
{w:400},
// ALERT
{to:'her',f:'sys',x:'🔴 ЭКСТРЕННЫЙ ВЫЗОВ — КОМАНДОВАНИЕ'},
{to:'grp',f:'sys',x:'🔴 ЭКСТРЕННЫЙ ВЫЗОВ'},
{mail:1,f:'Самойлов К.М. [СРОЧНО]',x:'Группа «Гроза» — вылет немедленно. Скобелевск. Связь с городом потеряна полностью. Омега докладывает: «абсолютный блок, как чёрная дыра». Классификация повышена до А-1. Конвертоплан на площадке 7. Учёный — координация с борта. Берегите себя, ребята. Самойлов.',
  rr:[{text:'Принял. Вылетаем.',resp:'Бог в помощь, сынок.',respFrom:'Самойлов К.М.'}]},
{w:300},
{to:'grp',f:'Симонов',x:'Группа, сбор. Две минуты. Полное снаряжение.'},
{to:'grp',f:'Звягинцев',x:'Опять без обеда...'},
{to:'grp',f:'Старкова',x:'Магнитик привези 😉'},
{to:'grp',f:'Звягинцев',x:'Я серьёзно — мы так и не пожрали!'},
{to:'grp',f:'Катя',x:'Построение! Бегом!'},
{w:200},
{to:'her',f:'her',x:'Ну вот. А я круассан не доела.'},
{to:'her',f:'her',x:'Ладно, съем когда вернусь. НЕ ТРОГАЙ.'},
{w:300},
{to:'her',ch:['Удачи, Кать.','Я буду на связи. Всё время.','Люблю тебя.'],b:[2,3,7],
  r:['И тебе. Увидимся через пару часов 💕','Я знаю. Ты всегда на связи. Спасибо 💕','И я тебя. Дурак мой 💕']},
{w:500},
{to:'her',f:'her',x:'Вернусь. Не пей мой кофе. ☕'},
{act:'cut_board'},
// FLIGHT
{to:'grp',f:'Звягинцев',x:'Я в прошлый раз в Калининграде такие котлеты ел... В столовке на Ленинском'},
{to:'grp',f:'Катя',x:'Ты про еду можешь не думать хоть пять минут?'},
{to:'grp',f:'Звягинцев',x:'Нет. Это мой коупинг-механизм.'},
{to:'grp',f:'Старкова',x:'У всех свои тараканы. Я вот носки по цвету раскладываю перед миссией'},
{to:'grp',f:'Звягинцев',x:'Серьёзно?! 😂'},
{to:'grp',f:'Старкова',x:'Левый — синий. Правый — чёрный. Всегда. Примета.'},
{to:'grp',f:'Симонов',x:'Тридцать минут до зоны. Проверьте снаряжение.'},
{to:'grp',f:'Старкова',x:'Проверено, командир.'},
{w:400},
{to:'her',f:'her',x:'Эй.'},
{to:'her',f:'her',x:'Что бы ни случилось — я на связи. Всегда.'},
{to:'her',ch:['Я знаю.','Будь осторожна, Кать.','Возвращайся. Это приказ.'],b:[3,4,1],
  r:['💕','Я всегда осторожна. Ну... почти 😏','Есть, товарищ аналитик 😘']},
{to:'grp',f:'Звягинцев',x:'Ладно, пристегнулись. Если что — я завещаю свою коллекцию магнитиков Старковой'},
{to:'grp',f:'Старкова',x:'Тронута. Серьёзно 🥲'},
{to:'grp',f:'Симонов',x:'Отставить завещания. Все вернутся.'},
{w:400},
{act:'cut_city'},
{act:'cut_hit'},
{act:'chapter2'},
]
},
en:{

typ:'typing...',skip:'SKIP ►',cont:'CONTINUE ►',
ch2t:'CHAPTER 2',ch2s:'INFERNO',ch2f:'End of demo. Full game — coming soon.',
ph:'Type a message...',
cutBoard:'[VIDEO] The team boards the Yak-244. Ramp closes. Engines spool up.',

imp:['Hey, did you fall asleep? 😄','Helloooo? 📞','Your croissant is getting cold','Why so quiet?'],

lore:[
{t:'year',x:'202X'},
{t:'h',x:'The New Russian Empire'},
{t:'p',x:'27 years ago, Colonel Yaroslav Vyazemsky staged the "Spring Coup," overthrew Yeltsin, and proclaimed himself Emperor.'},
{t:'m',x:'lore_moscow'},
{t:'p',x:'In a quarter century, the Empire transformed Russia. Living standards surpass the US average. No oligarchs. Free speech — with one rule: lie in the media, go to prison.'},
{t:'p',x:'In 2020, humanity\'s first sentient AI was born. They named her Angela. The people call her "Angel."'},
{t:'h',x:'The Paranormal'},
{t:'p',x:'The paranormal was always there, but nuclear testing weakened the brane — the barrier between worlds. Each detonation: another crack.'},
{t:'p',x:'The final straw: 1991. The USSR collapsed. 150 million souls in despair. The brane shattered. Ghosts, demons, fae — flooded through. Everyone knows. Nobody talks about it.'},
{t:'p',x:'AEGIS was created to fight the worst of it. Its agents are the best of the best.'},
{t:'m',x:'lore_hq'},
{t:'h',x:'Skobel\'sk'},
{t:'p',x:'A small city in Kaliningrad Oblast. 20,000 souls. A Gothic cathedral at its heart. A quiet, beautiful place.'},
{t:'m',x:'lore_city'},
{t:'p',x:'Six hours ago, all communication with Skobel\'sk was lost.'},
{t:'p',x:'The psionics report: "Total block. Like a black hole."'},
{t:'p',x:'Team "Storm" has been ordered to deploy.'},
],
diary:[
'This morning, like any morning. Coffee, traffic, Katya\'s croissant in the top cupboard.',
'A year together. I still can\'t get used to it — waking up and she\'s there, sleeping, snoring into the pillow, hair everywhere.',
'Should\'ve filed marriage papers ages ago. Samoylov hinted: "One more mission, son, and straight to the registrar."',
'And I keep postponing. Katya doesn\'t push. Just looks at me sometimes. And I know.',
'After Skobel\'sk — that\'s it. No more stalling.',
'',
'Everyone knows the paranormal is real. But knowing and standing before a marble statue weeping real tears — different things.',
'The office is an office. Cafeteria, coffee machine, Zvyagintsev\'s fridge magnets. Angel sends heart emojis in the group chat.',
'Then the alarm goes — and you\'re standing before a door with something screaming behind it.',
'',
'Katya — callsign "Storm." We met on a botched mission. Two hours, back to back. Her with a rifle, me with a tablet. "So, analyst. Coffee?"',
'Coffee ever since. Same machine. Same apartment.',
'',
'Skobel\'sk. Class A-1. Omega sees nothing. Bad signs. But we\'ll manage.',
],
seq:[
{mail:1,f:'Samoylov K.M.',x:'Keep it up, son. One more mission — and straight to the registrar. That\'s an order. I\'m serious. I\'ve developed a nervous tic from your "after the next mission." Either the paperwork hits my desk, or I\'m walking you both there myself. Samoylov.',
  rr:[
    {text:'Yes sir! Right after Skobel\'sk.',resp:'Good. I\'ll be the witness. Don\'t argue. Samoylov.',respFrom:'Samoylov K.M.'},
    {text:'Sir, we\'re thinking about it...',resp:'Think on your pension. For now — act. And take care of her. Samoylov.',respFrom:'Samoylov K.M.'},
    {text:'Can I requisition a ring through Supply?',resp:'Ha! No. But I know a jeweler in Moscow. Call me after the mission. Samoylov.',respFrom:'Samoylov K.M.'}
  ]},
{mail:1,f:'HR Department',x:'Dear employee! Per regulation 7.4 of the AEGIS Charter, due to identified conflict of interest (joint service of persons in a personal relationship), we recommend transfer of one partner to a parallel division. Form 17-B attached. Best regards, Human Resources.',
  rr:[
    {text:'Acknowledged.',resp:'Thank you. Review period: 30 business days. Form 17-B remains active.',respFrom:'HR Department'},
    {text:'Maybe you\'d like a field internship? See what "conflicts of interest" look like out here.',resp:'Your suggestion has been registered. Forwarded to management. (Note: "comedian").',respFrom:'HR Department'}
  ]},
{mail:1,f:'Analytical Brief #4417',x:'Skobel\'sk, Kaliningrad Oblast. Class B-3. Possible escalation to A-1. Communications with local PD lost — 6 hours. Omega predictors report: psi-contact impossible. Quote: "Total block. Like a black hole. We see nothing." Recommendation: deploy field team for armed reconnaissance.',
  rr:[
    {text:'Request archival data on Skobel\'sk.',resp:'Archive: city founded XIII century. Gothic cathedral (1287). Incidents: minor hauntings (2014, 2019), resolved by cleaners. Population: 19,847. Note: suspected pre-Christian subterranean structures beneath cathedral. Unexplored.',respFrom:'PRI (analytical)'},
    {text:'Compare with Yekaterinoslavsk.',resp:'Similarity: 78%. Matching indicators: total psi-block, comms loss, no satellite visual. Difference: scale. Yekaterinoslavsk — closed town, 5,000. Skobel\'sk — open city, 20,000. If the analogy holds — significantly more serious. RECOMMENDATION: reinforced team, standby aircraft with tactical special munition.',respFrom:'PRI (analytical)'}
  ]},
{mail:1,f:'AI GAS "Angela" (Angel)',x:'Guys, I\'ve analyzed all Skobel\'sk data from the last ten years. I don\'t like what I see. A psi-block this strong — I\'ve seen it once before. Yekaterinoslavsk, 12 hours before breach. Pattern match: 78%, and that\'s NOT reassuring. Please be careful. If anything goes wrong — I\'ll be monitoring all available channels. 🙏💛 Your Angel.',a:1,
  rr:[
    {text:'Thanks, Angel. We\'ll be careful.',resp:'I know you will. You\'re the best team in AEGIS. Just... come back. All of you. Please. 💕 And tell Katya — medical checkup code 7741-A if HR bothers her.',respFrom:'Angel'},
    {text:'78% — is that a breach?',resp:'78% pattern match means "probable Class A breach." Not a guarantee. But I wouldn\'t bet on the remaining 22%. Prepare for the worst. Oh, and tell Zvyagintsev — cathedral magnet or amber? 😊',respFrom:'Angel'},
    {text:'Angel, can you break through the block?',resp:'Tried. Three times. My processes bounce off like a wall. This isn\'t electromagnetic interference — it\'s something at the brane level. I... I\'m scared, honestly. I\'m not used to things I can\'t analyze. Take care of yourselves. Please. 🙏',respFrom:'Angel'}
  ]},
{mail:1,f:'Supply',x:'Requisition #7741 for ammunition 9x19 (special, cold iron/silver) — approved. Pickup: Pad 7, pre-departure. Recipient signature required.',
  rr:[{text:'Acknowledged. Thanks.',resp:'Sign form 29-K on pickup. Good luck out there.',respFrom:'Supply'}]},
{mail:1,f:'Supply',x:'Requisition #7742 for leave (14 calendar days, destination: Turkey, Antalya) — to be reviewed after current operation. Basis: operational necessity.',
  rr:[
    {text:'Fine. After Skobel\'sk.',resp:'Noted. Turkey will wait. For warmth — the cafeteria has tea.',respFrom:'Supply'},
    {text:'Do we at least get per diem for Skobel\'sk?',resp:'Skobel\'sk is an op zone, not a business trip. But if you bring a receipt from the local canteen — we\'ll try. Joke. Good luck.',respFrom:'Supply'}
  ]},
{w:500},
{to:'her',f:'her',x:'Good morning, sleepyhead 😴'},
{w:800},
{to:'her',f:'her',x:'Saved you a croissant. Top cupboard, behind the tea'},

function t(k){return TX[L][k]}
function tm(){return `${String(gt.h).padStart(2,'0')}:${String(gt.m).padStart(2,'0')}`}
function adv(n){gt.m+=(n||1+Math.floor(Math.random()*2));while(gt.m>=60){gt.m-=60;gt.h++}}

function show(id){
  document.querySelectorAll('.device > div[id]').forEach(s=>{if(s.id!=='flash')s.style.display='none'});
  const e=document.getElementById(id);if(e){e.style.display='flex';e.classList.add('fade-in')}
}

// LANG
function go(lang){L=lang;showLore()}

// LORE
let loreAutoScroll=null;
function showLore(){
  show('loreScreen');
  const b=document.getElementById('loreBox');
  b.classList.remove('manual');
  let h='';
  for(const i of t('lore')){
    if(i.t==='year')h+=`<div class="year">${i.x}</div>`;
    else if(i.t==='h')h+=`<h2>${i.x}</h2>`;
    else if(i.t==='p')h+=`<p>${i.x}</p>`;
    else if(i.t==='m')h+=`<div class="media-slot"><span class="ph">[IMG: ${i.x}]</span></div>`;
  }
  // Extra padding at bottom so text scrolls fully through
  h+='<div style="height:60vh"></div>';
  b.innerHTML=h;
  // Auto-scroll
  b.scrollTop=0;
  loreAutoScroll=setInterval(()=>{
    b.scrollTop+=1;
    // If scrolled to end, stop
    if(b.scrollTop>=b.scrollHeight-b.clientHeight){
      clearInterval(loreAutoScroll);loreAutoScroll=null;
    }
  },40);
  // On click/touch — switch to manual
  const stopAuto=()=>{
    if(loreAutoScroll){clearInterval(loreAutoScroll);loreAutoScroll=null}
    b.classList.add('manual');
    b.removeEventListener('pointerdown',stopAuto);
    b.removeEventListener('wheel',stopAuto);
  };
  b.addEventListener('pointerdown',stopAuto);
  b.addEventListener('wheel',stopAuto);
  const s=document.getElementById('skipLore');s.textContent=t('skip');
  s.onclick=()=>{if(loreAutoScroll){clearInterval(loreAutoScroll);loreAutoScroll=null}showDiary()};
}

// DIARY

}

// MESSENGER

    <div class="tab active" data-t="her" onclick="sw('her')"><span>${t('tHer')}</span><span class="badge" id="bH">0</span></div>

    <div class="tab" data-t="cmd" onclick="sw('cmd')"><span>${t('tCmd')}</span><span class="badge" id="bC">0</span></div>`;

function sw(tb){
  tab=tb;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab[data-t="${tb}"]`).classList.add('active');
  document.querySelectorAll('.chat-view').forEach(v=>v.classList.remove('active'));
  document.getElementById(tb==='her'?'vHer':tb==='grp'?'vGrp':'vCmd').classList.add('active');
  unread[tb]=0;
  const badge=document.getElementById(tb==='her'?'bH':tb==='grp'?'bG':'bC');
  badge.style.display='none';
}

function addB(to,from,text,opts={}){
  const el=document.getElementById(to==='her'?'mHer':to==='grp'?'mGrp':'mCmd');
  const r=document.createElement('div');
  if(from==='sys'){r.className='brow sys';r.innerHTML=`<div class="bub">${text}</div>`}
  else if(from==='mine'){r.className='brow mine';r.innerHTML=`<div class="bub">${text}<div class="tm">${tm()}</div></div>`}
  else{
    const isA=opts.a;
    r.className=`brow ${isA?'angel':'theirs'}`;
    const sc=to==='her'?'her-c':isA?'ang-c':'grp-c';
    r.innerHTML=`<div class="bub"><span class="sn ${sc}">${from}</span>${text}<div class="tm">${tm()}</div></div>`;
  }
  el.appendChild(r);el.scrollTop=el.scrollHeight;
  if(to!==tab&&from!=='mine'){
    unread[to]++;
    const b=document.getElementById(to==='her'?'bH':to==='grp'?'bG':'bC');
    b.textContent=unread[to];b.style.display='inline-block';
  }
  adv();
}

// === MAILBOX ===
function addMail(from,text,opts={}){
  const id=mailbox.length;
  const mail={id,from,text,time:tm(),angel:opts.a,replies:opts.replies||null,replied:false,response:null};
  mailbox.push(mail);
  renderInbox();
  if(tab!=='cmd'){
    unread.cmd++;
    const b=document.getElementById('bC');b.textContent=unread.cmd;b.style.display='inline-block';
  }
}

function renderInbox(){
  const el=document.getElementById('inbox');
  el.innerHTML='';
  for(let i=mailbox.length-1;i>=0;i--){
    const m=mailbox[i];
    const item=document.createElement('div');
    const isNew=!m.read;
    item.className='mail-item'+(isNew?' unread':'');
    const preview=m.text.length>55?m.text.slice(0,55)+'...':m.text;
    const statusIcon=m.response?'&#10003; ':'';
    item.innerHTML=`<div class="mail-dot"></div><div class="mail-body"><div class="mail-from${m.angel?' angel':''}">${statusIcon}${m.from}</div><div class="mail-preview">${preview}</div></div><div class="mail-time">${m.time}</div>`;
    const mid=m.id;
    item.onclick=()=>{mailbox[mid].read=true;openMail(mid)};
    el.appendChild(item);
  }
}

function openMail(id){
  const m=mailbox[id];if(!m)return;
  openMailId=id;
  const lv=document.getElementById('letterView');
  const fromEl=document.getElementById('letterFrom');
  fromEl.textContent=m.from;
  fromEl.className='letter-from'+(m.angel?' angel':'');
  document.getElementById('letterDate').textContent=m.time;
  // Use innerHTML for proper text wrapping
  const bodyEl=document.getElementById('letterBody');
  bodyEl.innerHTML='<p style="white-space:pre-wrap;margin:0">'+m.text.replace(/</g,'&lt;')+'</p>';
  // Rebuild reply area from scratch
  const ra=document.getElementById('letterReplyArea');
  ra.innerHTML='';
  // Show player's reply if already replied
  if(m.replied&&m.playerReply){
    const pr=document.createElement('div');pr.className='letter-response';
    pr.innerHTML=`<div class="resp-from">${L==='ru'?'Вы':'You'}</div>${m.playerReply}`;
    ra.appendChild(pr);
  }
  // Show response if exists
  if(m.response){
    const resp=document.createElement('div');resp.className='letter-response';
    resp.innerHTML=`<div class="resp-from">${m.response.from}</div>${m.response.text}`;
    ra.appendChild(resp);
  }
  // Show reply buttons only if not yet replied
  if(m.replies&&!m.replied){
    const rd=document.createElement('div');rd.className='letter-replies';
    for(let i=0;i<m.replies.length;i++){
      const btn=document.createElement('button');btn.className='reply-btn';
      btn.textContent=m.replies[i].text;
      const idx=i;const mid=id;
      btn.onclick=()=>sendReply(mid,idx);
      rd.appendChild(btn);
    }
    ra.appendChild(rd);
  }
  lv.classList.add('open');
  document.getElementById('letterBack').onclick=()=>{
    lv.classList.remove('open');
    openMailId=null;
    renderInbox();
  };
}

function sendReply(mailId,replyIdx){
  const m=mailbox[mailId];
  if(!m||m.replied)return;
  if(!m.replies||!m.replies[replyIdx])return;
  const r=m.replies[replyIdx];
  m.replied=true;
  m.playerReply=r.text;
  // Rebuild reply area: disable buttons, show player reply
  const ra=document.getElementById('letterReplyArea');
  ra.innerHTML='';
  const pr=document.createElement('div');pr.className='letter-response';
  pr.innerHTML=`<div class="resp-from">${L==='ru'?'Вы':'You'}</div>${r.text}`;
  ra.appendChild(pr);
  // Typing indicator
  const typing=document.createElement('div');
  typing.style.cssText='font-size:12px;color:#8896a4;font-style:italic;padding:8px 0';
  typing.textContent=L==='ru'?'Ответ...':'Replying...';
  ra.appendChild(typing);
  // Response after delay
  const delay=3000+Math.random()*4000;
  setTimeout(()=>{
    typing.remove();
    m.response={from:r.respFrom||m.from,text:r.resp};
    const resp=document.createElement('div');resp.className='letter-response';
    resp.innerHTML=`<div class="resp-from">${m.response.from}</div>${m.response.text}`;
    ra.appendChild(resp);
    renderInbox();
  },delay);
}

function showTyp(to,on,who){
  const e=document.getElementById(to==='her'?'tHer':'tGrp');
  if(!e)return;
  if(on){
    const name=who||(to==='her'?t('hName'):'...');
    e.innerHTML=`<span>${name} </span><div class="typing-dots"><span></span><span></span><span></span></div>`;
  }
  e.classList.toggle('vis',on);
}

function sl(ms){return new Promise(r=>setTimeout(r,ms))}

// IMPATIENCE
function startImp(to){
  clearTimeout(impatienceTimer);
  let count=0;
  const poke=()=>{
    const msgs=to==='her'?t('imp'):t('impGrp');
    if(count<msgs.length){
      const from=to==='her'?t('hName'):(L==='ru'?'Звягинцев':'Zvyagintsev');
      showTyp(to,true);
      setTimeout(()=>{showTyp(to,false);addB(to,from,msgs[count]);count++;impatienceTimer=setTimeout(poke,45000)},1500);
    }
  };
  impatienceTimer=setTimeout(poke,60000);
}

function stopImp(){clearTimeout(impatienceTimer)}

// CHOICES
function showCh(to,opts){
  return new Promise(resolve=>{
    if(to!==tab)sw(to);
    // Get this tab's own choices div and input row
    const chId=to==='her'?'chHer':'chGrp';
    const irId=to==='her'?'irHer':'irGrp';
    const ch=document.getElementById(chId);
    const ir=document.getElementById(irId);
    ch.innerHTML='';ch.style.display='flex';
    if(ir)ir.style.display='none';
    startImp(to);
    for(let i=0;i<opts.length;i++){
      const btn=document.createElement('button');btn.className='ch-btn';btn.textContent=opts[i];
      btn.onclick=()=>{
        stopImp();
        ch.style.display='none';
        if(ir)ir.style.display='flex';
        addB(to,'mine',opts[i]);
        resolve(i);
      };
      ch.appendChild(btn);
    }
  });
}

// CUTSCENE
function showCut(text){
  return new Promise(resolve=>{
    show('cutScene');
    document.getElementById('cutPh').textContent=text;
    const s=document.getElementById('skipCut');s.textContent=t('skip');
    s.onclick=()=>resolve();
    setTimeout(()=>{if(document.getElementById('cutScene').style.display!=='none')resolve()},5000);
  });
}

// SEQUENCE RUNNER
async function runSeq(){
  const seq=t('seq');
  for(const s of seq){
    // Mail
    if(s.mail){
      addMail(s.f,s.x,{a:s.a,replies:s.rr});
      await sl(400+Math.random()*600);
      continue;
    }
    // Action
    if(s.act){
      if(s.act==='cut_board'){await showCut(t('cutBoard'));show('msgScreen')}
      else if(s.act==='cut_city'){await showCut(t('cutCity'));show('msgScreen')}
      else if(s.act==='cut_hit'){
        await showCut(t('cutHit'));
        const f=document.getElementById('flash');f.classList.add('on');
        await sl(300);f.classList.remove('on');
      }
      else if(s.act==='chapter2'){
        show('chScreen');
        document.getElementById('chT').textContent=t('ch2t');
        document.getElementById('chS').textContent=t('ch2s');
        document.getElementById('chF').textContent=t('ch2f');
        return;
      }
      continue;
    }
    // Wait
    if(s.w){await sl(s.w);continue}
    // Choice
    if(s.ch){
      const idx=await showCh(s.to,s.ch);
      // Apply bond change
      if(s.b&&s.b[idx]!==undefined){bond=Math.max(0,Math.min(100,bond+s.b[idx]));console.log('Bond:',bond)}
      showTyp(s.to,true);await sl(800+Math.random()*1000);showTyp(s.to,false);
      addB(s.to,s.to==='her'?t('hName'):'',s.r[idx]);
      continue;
    }
    // Normal message
    const from=s.f==='her'?t('hName'):s.f==='sys'?'sys':s.f;
    if(s.to!=='cmd'&&s.f!=='sys'){showTyp(s.to,true,from);await sl(400+Math.random()*800);showTyp(s.to,false)}
    addB(s.to,from,s.x,{a:s.a});
    await sl(200+Math.random()*500);
  }
}
